<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <meta name="description" content="A dungeon that remembers you — powered by Cognee" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />
        
        <!-- OpenGraph tags -->
        <meta property="og:title" content="Dungeon of Recall" />
        <meta property="og:description" content="A dungeon that remembers you — powered by Cognee" />
        <meta property="og:type" content="website" />

        <!-- manifest.json provides metadata used when your web app is installed on a user's mobile device or desktop. -->
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
        <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />

        <title>Dungeon of Recall</title>
        <script>
            window.addEventListener("error", function(e) {
                if (e.error instanceof DOMException && e.error.name === "DataCloneError" && e.message && e.message.includes("PerformanceServerTiming")) {
                    e.stopImmediatePropagation();
                    e.preventDefault();
                }
            }, true);
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
